<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asistente Liceo Canadiense</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0d1b2a;
            --container-bg: #ffffff;
            --text-main: #0d1b2a;
            --text-muted: #4a5568;
            --accent-color: #e53e3e;
            --accent-hover: #c53030;
        }
        body { font-family: sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 90vh; }
        .app-container { width: 100%; max-width: 400px; background-color: var(--container-bg); border-radius: 24px; padding: 24px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4); text-align: center; }
        .logo { width: 80px; height: 80px; border-radius: 50%; background: var(--accent-color); display: inline-flex; align-items: center; justify-content: center; font-size: 32px; color: white; margin-bottom: 20px; }
        textarea { width: 100%; height: 90px; background-color: #f7fafc; border: 2px solid #e2e8f0; border-radius: 14px; padding: 12px; box-sizing: border-box; margin-bottom: 20px; }
        .btn { background-color: var(--accent-color); color: white; border: none; border-radius: 14px; padding: 14px; width: 100%; font-weight: 600; cursor: pointer; }
        #responseText { margin-top: 20px; padding: 15px; background: #f7fafc; border-radius: 14px; text-align: left; white-space: pre-wrap; display: none; color: var(--text-main); font-size: 14px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="logo">💬</div>
        <h1>Asistente</h1>
        <p>Escribe tu consulta y obtén la respuesta</p>
        <textarea id="userInput" placeholder="¿Qué deseas saber?"></textarea>
        <button class="btn" id="sendBtn" onclick="processRequest()">Obtener Respuesta</button>
        <div id="responseText"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        const MAKE_WEBHOOK_URL = 'https://hook.us2.make.com/38cbyml0tfqe2co0yomaj6p19d1v0rxu';

        async function processRequest() {
            const input = document.getElementById('userInput').value;
            const btn = document.getElementById('sendBtn');
            const responseDiv = document.getElementById('responseText');

            if (!input.trim()) return alert("Escribe algo primero.");

            btn.innerText = "Consultando...";
            btn.disabled = true;
            responseDiv.style.display = 'none';

            try {
                const response = await fetch(MAKE_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensaje: input })
                });

                const data = await response.text();
                responseDiv.innerText = data;
                responseDiv.style.display = 'block';
            } catch (error) {
                alert("Error al conectar con la IA.");
            } finally {
                btn.innerText = "Obtener Respuesta";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
